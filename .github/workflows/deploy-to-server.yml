#this will deploy the safe / secure / tested app to prod server
 
name: Deploy to Server

# on: 
#      workflow_call:
#         name: Deploy to Server

on: 
  workflow_call:

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: copy the docker-compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/devops"

      - name: SSH to pro server & run the app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Running App Deployment..."
            
            # Use 'vars' or 'secrets' consistently. 
            # If you saved 'mahesh5752' in Variables, use vars.
            # If you saved it in Secrets, use secrets.
            D_USER="${{ vars.DOCKERHUB_USER }}"
            D_TAG="latest"

            echo "Target User: $D_USER"
            echo "Target Tag: $D_TAG"

            # 1. Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "$D_USER" --password-stdin

            # 2. Navigate and Deploy
            cd ~/devops
            
            # We pass the variables directly to the docker compose command
            sudo DOCKERHUB_USER=$D_USER DOCKER_TAG=$D_TAG docker compose down
            sudo DOCKERHUB_USER=$D_USER DOCKER_TAG=$D_TAG docker compose up -d --pull always


































