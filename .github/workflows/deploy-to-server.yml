#this will deploy the safe / secure / tested app to prod server
 
name: Deploy to Server

on: 
     workflow_call:

jobs:
    Deploy:
        runs-on: ubuntu-latest
        steps:
            
            - name: SSH to pro server & create app folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                 host: ${{ secrets.EC2_SSH_HOST }}
                 username: ${{ secrets.EC2_SSH_USER }}
                 key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

                 script: |
                    echo "starting deployment"
                    mkdir -p devops
            
            - name: Checkout code
              uses: actions/checkout@v4

            - name: copy the docker-compose file
              uses: appleboy/scp-action@v1
              with:
                 host: ${{ secrets.EC2_SSH_HOST }}
                 username: ${{ secrets.EC2_SSH_USER }}
                 key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                 source: "docker-compose.yml"
                 target: ~/devops
        
            - name: SSH to pro server & run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                 host: ${{ secrets.EC2_SSH_HOST }}
                 username: ${{ secrets.EC2_SSH_USER }}
                 key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

                 script: |
                    echo "Running  App"
                    sudo apt-get update && sudo apt-get install docker.io docker-compose v2-y
                    sudo usermod -aG docker $USER && newgrp docker
                    export DOCKER_USER=${{ vars.DOCKERHUB_USER }}
                    export DOCKER_TAG=${{ github.event.workflow_run.head_sha }}
                    echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USER }} --password-stdin    
                    cd ~/devops && docker compose down && docker compose up -d --build --force-recreate --pull always