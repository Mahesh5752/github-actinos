<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }

        .box {
            margin-top: 150px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: #333;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #ddd;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Welcome to HTML Page 🎉</h1>
    <p>This is your simple web page</p>

    <button onclick="showMessage()">Click Me</button>
</div>

<script>
    function showMessage() {
        alert("Welcome Mahesh! 🚀");
    }
</script>

</body>
</html>
